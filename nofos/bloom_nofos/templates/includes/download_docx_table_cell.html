{% load static %}

<style>
  .content-guide-download-cell {
    white-space: nowrap;
  }

  .content-guide-download-form {
    display: inline;
  }

  .content-guide-download-spinner {
    display: none;
    width: 1rem;
    height: 1rem;
    flex: 0 0 auto;
  }

  .content-guide-download-cell.is-downloading .content-guide-download-spinner {
    display: inline-block;
  }

  .content-guide-download-error {
    display: none;
    margin-top: 0.25rem;
    font-size: 0.875rem;
    line-height: 1.2;
  }

  .content-guide-download-cell.is-error .content-guide-download-error {
    display: block;
  }
</style>

<span class="content-guide-download-cell">
  <form
    method="post"
    action="{{ action_url }}"
    class="content-guide-download-form"
    data-csrf-token="{{ csrf_token }}"
  >
    {% csrf_token %}
    <input type="hidden" name="export_action" value="download" />

    <button
      type="submit"
      class="content-guide-download-btn usa-button--unstyled usa-button--icon usa-button--icon--before usa-button--icon--usa-blue usa-button--file_download"
      data-default-label="Download"
      data-loading-label="Preparing…"
    >
      <img
        src="{% static 'img/loader.svg' %}"
        alt=""
        class="content-guide-download-spinner"
        aria-hidden="true"
      />
      <span class="content-guide-download-label">Download</span>
      <span class="usa-sr-only"> this document</span>
    </button>
  </form>

  <div
    class="content-guide-download-error text-secondary-dark"
    aria-live="polite"
  >
    Sorry — download failed. Try again.
  </div>
</span>

<script>
  (function () {
    const currentScript = document.currentScript;
    const root = currentScript?.previousElementSibling;
    if (!root || root.dataset.downloadBound === "true") return;
    root.dataset.downloadBound = "true";

    const form = root.querySelector(".content-guide-download-form");
    const button = root.querySelector(".content-guide-download-btn");
    const label = root.querySelector(".content-guide-download-label");

    if (!form || !button || !label) return;

    async function downloadBlob(form) {
      const formData = new FormData(form);
      const csrfToken = form.dataset.csrfToken;

      const resp = await fetch(form.action, {
        method: "POST",
        body: formData,
        credentials: "same-origin",
        headers: {
          "X-Requested-With": "XMLHttpRequest",
          "X-CSRFToken": csrfToken,
        },
      });

      if (!resp.ok) {
        const text = await resp.text().catch(() => "");
        throw new Error(text || `Request failed (${resp.status})`);
      }

      const blob = await resp.blob();

      let filename = "document.docx";
      const cd = resp.headers.get("Content-Disposition");
      const match = cd && cd.match(/filename="([^"]+)"/i);
      if (match?.[1]) {
        filename = match[1];
      }

      const objectUrl = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = objectUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(objectUrl);
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const defaultLabel = button.dataset.defaultLabel || "Download";
      const loadingLabel = button.dataset.loadingLabel || "Preparing…";

      root.classList.remove("is-error");
      button.disabled = true;
      label.textContent = loadingLabel;
      root.classList.add("is-downloading");

      try {
        await downloadBlob(form);

        setTimeout(() => {
          button.disabled = false;
          label.textContent = defaultLabel;
          root.classList.remove("is-downloading");
        }, 1000);
      } catch (err) {
        console.error(err);
        button.disabled = false;
        label.textContent = defaultLabel;
        root.classList.remove("is-downloading");
        root.classList.add("is-error");
      }
    });
  })();
</script>
